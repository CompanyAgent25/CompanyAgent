services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: companyagent
      POSTGRES_PASSWORD: companyagent
      POSTGRES_DB: companyagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./database/seeds/seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companyagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rust-api:
    build:
      context: .
      dockerfile: infra/Dockerfile.rust
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://companyagent:companyagent@db:5432/companyagent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RUST_API_HOST: ${RUST_API_HOST:-0.0.0.0}
      RUST_API_PORT: ${RUST_API_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-at-least-32-chars}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      BCRYPT_COST: ${BCRYPT_COST:-4}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL:-http://python-services:8000}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-services:
    build:
      context: .
      dockerfile: infra/Dockerfile.python
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://companyagent:companyagent@db:5432/companyagent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-replace-with-anthropic-key}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_ENABLE_TOOLS: ${LLM_ENABLE_TOOLS:-true}
      PYTHON_API_HOST: ${PYTHON_API_HOST:-0.0.0.0}
      PYTHON_API_PORT: ${PYTHON_API_PORT:-8000}
      RUST_API_URL: ${RUST_API_URL:-http://rust-api:8080}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_PYTHON_API_URL: ${NEXT_PUBLIC_PYTHON_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_PYTHON_API_URL: ${NEXT_PUBLIC_PYTHON_API_URL:-http://localhost:8000}
    depends_on:
      - rust-api
      - python-services

volumes:
  pgdata:
