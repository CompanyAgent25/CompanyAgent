name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/rust-api
      - name: Run clippy
        working-directory: backend/rust-api
        run: cargo clippy -- -D warnings
      - name: Run tests
        working-directory: backend/rust-api
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-at-least-32-characters-long
        run: cargo test

  python:
    name: Python Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend/python-services
        run: |
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint
        working-directory: backend/python-services
        run: ruff check .
      - name: Test
        working-directory: backend/python-services
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust, python, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Rust image
        run: docker build -f infra/Dockerfile.rust -t companyagent-rust .
      - name: Build Python image
        run: docker build -f infra/Dockerfile.python -t companyagent-python .
      - name: Build Frontend image
        run: docker build -f infra/Dockerfile.frontend -t companyagent-frontend .
